<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Intent Corretora</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root { --primary: #0f4c5c; --secondary: #f97316; --card: #ffffff; --text: #1f2937; --text-light: #6b7280; --border: #e5e7eb; --danger: #ef4444; --hover: #1e3a8a; }
        body { background: linear-gradient(135deg, var(--primary), #1a5f6e); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-card { background-color: var(--card); border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; }
        .login-header h1 { color: var(--primary); font-size: 24px; margin: 10px 0 5px; }
        .login-header h1 span { color: var(--secondary); }
        .login-header p { color: var(--text-light); font-size: 14px; }
        .error-message { background-color: #fee2e2; color: var(--danger); padding: 10px; border-radius: 6px; margin-bottom: 20px; display: none; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; color: var(--text); }
        .form-group input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: var(--primary); }
        .login-btn { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .login-btn:hover { background-color: var(--hover); }
        .forgot-password { text-align: right; margin-top: 10px; }
        .forgot-password a { color: var(--text-light); font-size: 12px; text-decoration: none; }
        .forgot-password a:hover { color: var(--secondary); }
        .register-link { text-align: center; margin-top: 20px; color: var(--text-light); font-size: 14px; }
        .register-link a { color: var(--secondary); text-decoration: none; font-weight: 600; }
        .register-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div style="font-size: 64px; margin-bottom: 10px;">🛡️</div>
            <h1>Parceiros <span>Intent</span></h1>
            <p>Faça login para acessar sua área de parcerias</p>
        </div>
        <div id="error" class="error-message"></div>
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" placeholder="********" required>
        </div>
        <button class="login-btn" onclick="login()">Entrar</button>
        <div class="forgot-password">
            <a href="esqueci-senha.html">Esqueci minha senha</a>
        </div>
        <div class="register-link">
            Não tem conta? <a href="cadastro.html">Cadastre-se</a>
        </div>
    </div>
    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            if (!email || !password) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Preencha todos os campos';
                return;
            }
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    if (data.user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = data.error || 'Erro ao fazer login';
                }
            } catch (err) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Erro de conexão com o servidor';
            }
        }
    </script>
</body>
</html>
