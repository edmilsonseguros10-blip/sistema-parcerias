<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - Intent Parceiros</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #0f4c5c, #1a5f6e);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .cadastro-card {
        background: #ffffff;
        border-radius: 12px;
        padding: 40px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .logo {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo h1 {
        color: #0f4c5c;
        font-size: 28px;
      }
      .logo h1 span {
        color: #f97316;
      }
      .logo p {
        color: #6b7280;
        font-size: 14px;
        margin-top: 5px;
      }

      .form-group {
        margin-bottom: 15px;
      }

      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: 500;
        color: #1f2937;
      }

      .form-group input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        font-size: 14px;
      }

      .form-group input:focus {
        outline: none;
        border-color: #0f4c5c;
      }

      #btn-cadastrar {
        width: 100%;
        padding: 12px;
        background-color: #0f4c5c;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 10px;
      }

      #btn-cadastrar:hover {
        background-color: #1e3a8a;
      }

      #btn-cadastrar:disabled {
        background-color: #9ca3af;
        cursor: not-allowed;
      }

      .login-link {
        text-align: center;
        margin-top: 20px;
        color: #6b7280;
        font-size: 14px;
      }

      .login-link a {
        color: #f97316;
        text-decoration: none;
        font-weight: 600;
      }

      .error-message {
        background-color: #fee2e2;
        color: #ef4444;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 20px;
        text-align: center;
        display: none;
      }

      .success-message {
        background-color: #d1fae5;
        color: #065f46;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 20px;
        text-align: center;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="cadastro-card">
      <div class="logo">
        <h1>Parceiros <span>Intent</span></h1>
        <p>Cadastre-se e comece a ganhar 50% de comissão</p>
      </div>

      <div id="error" class="error-message"></div>
      <div id="success" class="success-message"></div>

      <div class="form-group">
        <label for="name">Nome completo *</label>
        <input type="text" id="name" placeholder="Seu nome completo" />
      </div>

      <div class="form-group">
        <label for="email">E-mail *</label>
        <input type="email" id="email" placeholder="seu@email.com" />
      </div>

      <div class="form-group">
        <label for="phone">Telefone *</label>
        <input type="text" id="phone" placeholder="(11) 99999-9999" />
      </div>

      <div class="form-group">
        <label for="cpf">CPF *</label>
        <input type="text" id="cpf" placeholder="123.456.789-00" />
      </div>

      <div class="form-group">
        <label for="pix_key">Chave PIX *</label>
        <input type="text" id="pix_key" placeholder="email, CPF ou telefone" />
      </div>

      <div class="form-group">
        <label for="password">Senha *</label>
        <input
          type="password"
          id="password"
          placeholder="Mínimo 6 caracteres"
        />
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirmar senha *</label>
        <input
          type="password"
          id="confirm_password"
          placeholder="Repita a senha"
        />
      </div>

      <button id="btn-cadastrar">Cadastrar</button>

      <div class="login-link">
        Já tem conta? <a href="index.html">Faça login</a>
      </div>
    </div>

    <script>
      document
        .getElementById("btn-cadastrar")
        .addEventListener("click", async function () {
          var btn = document.getElementById("btn-cadastrar");
          var errorDiv = document.getElementById("error");
          var successDiv = document.getElementById("success");

          var name = document.getElementById("name").value.trim();
          var email = document.getElementById("email").value.trim();
          var phone = document.getElementById("phone").value.trim();
          var cpf = document.getElementById("cpf").value.trim();
          var pix_key = document.getElementById("pix_key").value.trim();
          var password = document.getElementById("password").value;
          var confirm_password =
            document.getElementById("confirm_password").value;

          errorDiv.style.display = "none";
          successDiv.style.display = "none";

          if (!name || !email || !phone || !cpf || !pix_key || !password) {
            errorDiv.textContent = "Preencha todos os campos obrigatórios";
            errorDiv.style.display = "block";
            return;
          }

          if (password !== confirm_password) {
            errorDiv.textContent = "As senhas não coincidem";
            errorDiv.style.display = "block";
            return;
          }

          if (password.length < 6) {
            errorDiv.textContent = "A senha deve ter pelo menos 6 caracteres";
            errorDiv.style.display = "block";
            return;
          }

          btn.disabled = true;
          btn.textContent = "Cadastrando...";

          try {
            var response = await fetch("/api/auth/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                name,
                email,
                phone,
                cpf,
                pix_key,
                password,
              }),
            });

            var data = await response.json();

            if (response.ok) {
              successDiv.textContent =
                "Cadastro realizado com sucesso! Redirecionando para o login...";
              successDiv.style.display = "block";

              setTimeout(function () {
                window.location.href = "index.html";
              }, 2000);
            } else {
              errorDiv.textContent = data.error || "Erro ao cadastrar";
              errorDiv.style.display = "block";
              btn.disabled = false;
              btn.textContent = "Cadastrar";
            }
          } catch (err) {
            console.error("Erro:", err);
            errorDiv.textContent = "Erro de conexão. Tente novamente.";
            errorDiv.style.display = "block";
            btn.disabled = false;
            btn.textContent = "Cadastrar";
          }
        });
    </script>
  </body>
</html>
